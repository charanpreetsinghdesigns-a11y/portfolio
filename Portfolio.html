<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charanpreet Singh – UX Designer</title>

  <!-- Gothic A1 Bold — used for CHARANPREET SINGH and USER EXPERIENCE DESIGNER -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@700&display=swap" rel="stylesheet">

  <style>
    /* ── Local fonts ── */
    @font-face {
      font-family: 'Franklin Gothic Demi';
      src: url('Assets.html/Franklin Gothic Demi Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Franklin Gothic';
      src: url('Assets.html/FranklinGothic.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    /* ── Global reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ── Page shell: vertical stack filling the viewport ── */
    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Design tokens ── */
    :root {
      --green:      #00d2a0;
      --grey:       #eaeaea;
      /* Column split: 1004 / 1920 = 52.2917% */
      --split:      52.2917%;
      /* Topbar: fixed 48px */
      --topbar-h:   48px;
      /* Navbar: 165px at 1920px → 8.5938vw */
      --navbar-h:   clamp(110px, 8.5938vw, 165px);
      /* Left pad: 64px at 1920px → 3.3333vw (navbar name) / 62px body → 3.2292vw */
      --pad-name:   clamp(40px, 3.3333vw, 64px);
      --pad-body:   clamp(40px, 3.2292vw, 62px);
      /* Body gap (between intro and picture): 72px → 3.75vw */
      --body-gap:   clamp(44px, 3.75vw, 72px);
    }

    /* ════════════════════════════════════════
       TOP BAR
    ════════════════════════════════════════ */
    .topbar {
      width: 100%;
      height: var(--topbar-h);
      background: #000;
      flex-shrink: 0;
    }

    /* ════════════════════════════════════════
       NAV BAR
    ════════════════════════════════════════ */
    .navbar {
      display: flex;
      width: 100%;
      height: var(--navbar-h);
      flex-shrink: 0;
    }

    /* Left zone: green, holds the name */
    .navbar-name {
      flex: 0 0 var(--split);
      background: var(--green);
      display: flex;
      align-items: center;
      padding-left: var(--pad-name);
      padding-right: 20px;
    }

    .navbar-name h1 {
      font-family: 'Gothic A1', sans-serif;
      font-weight: 700;
      /* 84px at 1920px → 4.375vw */
      font-size: clamp(52px, 4.375vw, 84px);
      color: #fff;
      line-height: 1;
      white-space: nowrap;
    }

    /* Right zone: grey, holds nav links */
    .navbar-nav {
      flex: 1;
      background: var(--grey);
      display: flex;
      align-items: center;
      justify-content: center;
      /* 48px gap at 1920px → 2.5vw */
      gap: clamp(28px, 2.5vw, 48px);
    }

    .navbar-nav a {
      font-family: 'Franklin Gothic Demi', 'Franklin Gothic Medium', 'Arial Narrow', sans-serif;
      /* 28px at 1920px → 1.4583vw */
      font-size: clamp(16px, 1.4583vw, 28px);
      color: #000;
      text-decoration: none;
      font-weight: 400;
      white-space: nowrap;
    }

    .navbar-nav a:hover { opacity: 0.7; }

    /* ════════════════════════════════════════
       HERO BODY
       Figma: 867px tall, padding-left 62px, gap 72px, items-center
    ════════════════════════════════════════ */
    .hero {
      flex: 1;                      /* fills remaining viewport height */
      display: flex;
      align-items: center;          /* vertically centres the intro column */
      background: var(--green);
      padding-left: var(--pad-body);
      gap: var(--body-gap);
      min-height: 0;                /* prevents flex overflow */
    }

    /* Left frame: intro content */
    .hero-intro {
      flex: 1 0 0;
      /* 1029px max at 1920 → 53.59vw */
      max-width: clamp(700px, 53.59vw, 1029px);
      display: flex;
      flex-direction: column;
      /* 56px gap between all three content blocks */
      gap: clamp(36px, 2.9167vw, 56px);
    }

    .hero-title {
      font-family: 'Gothic A1', sans-serif;
      font-weight: 700;
      /* 110px at 1920px → 5.7292vw */
      font-size: clamp(68px, 5.7292vw, 110px);
      color: #000;
      /* 2 lines × 138px = 276px total; 138/110 ≈ 1.254 */
      line-height: 1.254;
    }

    .hero-subtitle {
      font-family: 'Franklin Gothic Demi', 'Franklin Gothic Medium', 'Arial Narrow', sans-serif;
      /* 36px at 1920px → 1.875vw */
      font-size: clamp(22px, 1.875vw, 36px);
      color: #fff;
      font-weight: 400;
      /* 54px line-height at 36px font → 54/36 = 1.5 */
      line-height: 1.5;
    }

    /* CTA button */
    .btn-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #000;
      /* 289px × 52px at 1920px */
      width:  clamp(180px, 15.0521vw, 289px);
      height: clamp(34px,  2.7083vw,  52px);
      text-decoration: none;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .btn-cta:hover { background: #222; }

    .btn-cta span {
      font-family: 'Franklin Gothic Demi', 'Franklin Gothic Medium', 'Arial Narrow', sans-serif;
      /* 28px at 1920px → 1.4583vw */
      font-size: clamp(16px, 1.4583vw, 28px);
      color: #fff;
      font-weight: 400;
      white-space: nowrap;
    }

    /* Right frame: hero photograph */
    .hero-picture {
      flex: 1 0 0;
      /* 757px max at 1920px → 39.4271vw */
      max-width: clamp(500px, 39.4271vw, 757px);
      /* stretch overrides parent's align-items: center so image fills full height */
      align-self: stretch;
      overflow: hidden;
      position: relative;
    }

    .hero-picture img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ═══════════════════════════════════════════════
       REFINEMENTS
    ═══════════════════════════════════════════════ */

    /* Font rendering */
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* Focus states */
    :focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
      border-radius: 2px;
    }

    /* Nav link underline slide-in on hover */
    .navbar-nav a { position: relative; }
    .navbar-nav a::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -3px;
      height: 2px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .navbar-nav a:hover { opacity: 1; }
    .navbar-nav a:hover::after { transform: scaleX(1); }

    /* CTA button hover + press effect */
    .btn-cta {
      transition: background 0.2s,
                  transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.25s;
    }
    .btn-cta:hover {
      background: #1a1a1a;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }
    .btn-cta:active { transform: scale(0.97); box-shadow: none; }

    /* Hero elements: fade-in on page load */
    @media (prefers-reduced-motion: no-preference) {
      @keyframes heroFadeUp {
        from { opacity: 0; transform: translateY(22px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .hero-title    { animation: heroFadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.05s both; }
      .hero-subtitle { animation: heroFadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.20s both; }
      .btn-cta       { animation: heroFadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both; }
      .hero-picture  { animation: heroFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.10s both; }
    }
  </style>
</head>
<body>

  <!-- ── TOP BAR ── -->
  <div class="topbar"></div>

  <!-- ── NAV BAR ── -->
  <header class="navbar">
    <div class="navbar-name">
      <h1>CHARANPREET SINGH</h1>
    </div>
    <nav class="navbar-nav">
      <a href="MyWork.html">My Work</a>
      <a href="AboutMe.html">About Me</a>
      <a href="Resume_Charanpreet_Singh.pdf" target="_blank">Resume</a>
    </nav>
  </header>

  <!-- ── HERO BODY ── -->
  <section class="hero">

    <div class="hero-intro">
      <p class="hero-title">USER EXPERIENCE DESIGNER</p>
      <p class="hero-subtitle">
        Combining creativity and empathy to craft digital experiences that are
        visually engaging, intuitive, and impactful for every user
      </p>
      <a href="MyWork.html" class="btn-cta">
        <span>View Projects</span>
      </a>
    </div>

    <div class="hero-picture">
      <img
        src="https://www.figma.com/api/mcp/asset/6cb4262f-66ec-454d-b26b-da8b0022b3ee"
        alt="Charanpreet Singh"
      />
    </div>

  </section>

</body>
</html>
